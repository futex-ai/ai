name: CI

on:
  pull_request:
  push:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install 1.95.0 --profile minimal --component clippy,rustfmt
          rustup default 1.95.0

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'xtask/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cargo metadata
        run: cargo metadata --format-version 1 --no-deps

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features

      - name: Test
        run: cargo test --workspace --all-features

      - name: Rust file length
        run: cargo xtask rust-file-length-lint --all

      - name: Smoke test
        run: cargo xtask smoke-test

      - name: Full xtask check
        run: cargo xtask check
